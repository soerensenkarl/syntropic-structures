<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>syntropic structures</title>
<meta name="description" content="Real structures built with vibes.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
--bg: #F2EFE7;
--ink: #1C1B18;
--muted: #8A8374;
--accent: #8A7B5C;
--rule: rgba(28, 27, 24, 0.25);
}
html, body { margin: 0; padding: 0; }
body {
background: var(--bg);
color: var(--ink);
font-family: "PT Serif", serif;
min-height: 100vh;
display: flex;
flex-direction: column;
box-sizing: border-box;
}
header {
padding: 2rem 2.5rem;
}
.wordmark {
font-family: "IBM Plex Mono", monospace;
font-size: 0.72rem;
font-weight: 500;
letter-spacing: 0.35em;
text-transform: uppercase;
}
main {
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
text-align: center;
padding: 3rem 1.5rem;
}
h1 {
font-size: clamp(2.6rem, 7vw, 4.6rem);
font-weight: 400;
line-height: 1.1;
margin: 0;
letter-spacing: -0.01em;
}
.rule {
width: min(46rem, 82vw);
height: 1px;
background: var(--rule);
margin: 2.4rem 0 1.8rem;
}
.subtitle {
font-family: "IBM Plex Mono", monospace;
font-size: clamp(0.85rem, 1.6vw, 1rem);
letter-spacing: 0.08em;
color: var(--ink);
margin: 0;
}
footer {
text-align: center;
padding: 2.2rem 1.5rem 2.6rem;
font-family: "IBM Plex Mono", monospace;
font-size: 0.7rem;
letter-spacing: 0.25em;
text-transform: uppercase;
color: var(--muted);
line-height: 2;
}
footer .brand { color: var(--accent); }
</style>
</head>
<body>
<header>
<span class="wordmark">syntropic structures</span>
</header>
<main>
<h1>syntropic structures</h1>
<div class="rule"></div>
<p class="subtitle">Real structures built with vibes.</p>
</main>
<footer>
<span class="brand">syntropic structures&#174;</span><br>
2026
</footer>
</body>
</html>
